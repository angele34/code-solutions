<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Number Guessing Game</title>
</head>
<body>
    <div class="container">
        <h1>Number Guessing Game</h1>
        <p class="desc">We have selected a random number between 1 and 100. See if you can guess it in 10 turns or fewer. We'll tell you if your guess was too high or too low.</p>
        <div class="inner-container">
            <form>
                <input type="number" id="guessedNum" placeholder="Enter guess">
                <input type="button" value="Guess" id="submitBtn">
            </form>
        </div>
        <p id="guessDisplay"></p>
        <p id="prevGuesses"></p>
        <p id="guessStatus"></p>
        <button id="resetBtn">Play Again</button>

        
        <p id="hint"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
